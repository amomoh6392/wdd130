<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/poll=form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <title>Poll-form</title>
</head>
<body>
    <form >
        <fieldset>
            <legend>Contact Information</legend>
           <div class="form-item column2">
                <label for="fullname">Fullname</label>
                <input type="text" id="fullname" name="fullname" required>
           </div>
            <br>
            
            <div class="form-item column2">
                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail" required>
            </div>
    
            <br>
        </fieldset>
        <br>
        
        <fieldset>
            <legend>Questions</legend>
            <div class="form-item column1">
                <label for="quality">Select Quality</label>
                <select name="quality" id="quality">
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
        
            <div class="form-item column1">
                <label for="browser">What is your favorite internet browser</label>
                <select name="browser" id="browser">
                <option value="chrome">Chrome</option>
                <option value="firefox">Firefox</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
            </select>
            </div>

            <div class="form-item column1">
                <label for="pet">Do you have a house pet?</label>
                <input type="checkbox" id="pet" name="pet">
            </div>

            <div class="put">
                <label for="feedback">List the place you have lived:</label>
                <textarea name="feedback" id="feedback" rows="4" placeholder="Warri Delta Nigeria"></textarea>
            </div>
        </fieldset>
          <button type="submit">Submit Poll</button>
    </form>
   
      
        

    <footer>
        <p>&copy; 2025 ※ Abinadi Momoh Oke ※ Delta, Nigeria. ※</p>
    </footer>
</body>
</html>
