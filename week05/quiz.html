<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/quiz.css">
    <title>Quiz</title>
</head>
<body>
    <main class="box">
        <h1>🏳️ Basic Html and Css quiz</h1>
        <form class="box">
            <div class="quiz-item box" >
                <label for="Q1">1. what does CSS stand for:</label>
                <input type="text" id="Q1" name="Q1"> 
            </div>
            <div class="quiz-item box">
                
                <label for="Q2">2. what does html stand for:</label>
                <input type="text" id="Q2" name="Q2">
            </div>
            <div class="quiz-item box">
                 <label for="Q3">3. How do you style an html outlook:</label>
                <select name="Q3" id="Q3">
                    <option value="" selected disabled>choose One ...</option>
                    <option value="1">1. With CSS</option>
                    <option value="2">2. With AI</option>
                    <option value="3">3. With google fonts</option>
                </select>
            </div>
            <div class="quiz-item box">
                <label for="Q4">4. What is the bottom margin applied::</label>
                <code class="box">margin: 10px 15pz 20px;</code>
                <input type="number" id="Q4" name="Q4">
            </div>
            <button>Submit Quiz</button>
        </form>
    </main>
</body>
</html>
