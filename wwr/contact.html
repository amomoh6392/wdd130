<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <header class="main-header">
        <div class="logo">
            <img src="images/logo.jpg" alt="white water rafting logo" loading="lazy">
        </div>
        <nav class="nav-link">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="Company-details">
            <h2>The Am17 Rafting Company</h2>
            <p>15 Am17 Drive, jubile city</p>
            <p>Delta, Nigeria</p>
            <p>+234 816 8572 561</p>
            <p>info@am17rafting.com</p>

            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d254152.12121897144!2d5.760250482421894!3d5.548198430306731!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1774849178753!5m2!1sen!2sng" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>
        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <figure>

                <figcaption></figcaption>
            </figure>

             <figure>

                <figcaption></figcaption>
            </figure>

             <figure>

                <figcaption></figcaption>
            </figure>

        </section>
        <section class="contact-form">
            <form action="" method="post">
                <div>
                    <label for="user's name">User's Name</label>
                    <input type="user's name" id="user's name" name="user's name" required>
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>

                <p>Purpose of Message</p>
                <div>
                    <label>
                        <input type="radio" name="purpose" value="general" required>
                        General inquiry
                    </label>
                    <label>
                        <input type="radio" name="purpose" value="reservation" required>
                        Reservation Question
                    </label>
                    <label>
                        <input type="radio" name="purpose" value="suggestion" required>
                        Website Suggestion
                    </label>
                </div>
                <div>
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="5" required></textarea>
                </div>
                <label for="subscribe"> Please subscribe me to the monthly newsletter</label>
                <input type="checkbox" name="subscribe" id="subscribe">
                <button type="submit">Get in Touch!</button>

            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 ※ AM17 Rafting Site ※ Abinadi Momoh Oke ※</p>
        <nav class="socialmedia ">
            <a href="http://facebook.com">

            </a>
            <a href="http://linkedin.com">
                <img src="images/linkedin-logo.jpg" alt="linkedin-logo">
            </a>
            <a href="http://instagram.com">
                <img src="images/instagram-logo.jpg" alt="instagram logo">
            </a>
        </nav>
    </footer>
</body>
</html>
